name: Build Installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ── Windows MSI / NSIS .exe ────────────────────────────────────────────────
  build-windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      # Download the official wintun.dll (WireGuard's TUN driver, MIT-compatible).
      # The .dll is placed where tauri.conf.json "resources" picks it up.
      - name: Download wintun.dll
        shell: pwsh
        run: |
          $zip = "wintun-0.14.1.zip"
          Invoke-WebRequest -Uri "https://www.wintun.net/builds/$zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath wintun-pkg
          New-Item -ItemType Directory -Force -Path src-tauri\windows | Out-Null
          Copy-Item "wintun-pkg\wintun\bin\amd64\wintun.dll" "src-tauri\windows\wintun.dll"

      - name: Build Windows installer
        run: npm run tauri build -- --target x86_64-pc-windows-msvc
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: zero-protocol-windows-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload NSIS exe
        uses: actions/upload-artifact@v4
        with:
          name: zero-protocol-windows-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  # ── macOS DMG ──────────────────────────────────────────────────────────────
  # Cross-compiling macOS from Linux/Windows is NOT possible — Apple's linker
  # and SDK are macOS-only.  We use a macOS GitHub Actions runner instead.
  # "targets: all" in tauri.conf.json means this job already produces a .dmg.
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (universal binary)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Build a universal binary that runs on both Intel and Apple Silicon.
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      # Build a universal (fat) binary for Intel + Apple Silicon.
      - name: Build macOS DMG (universal)
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # Set to your Apple Developer ID certificate CN to enable notarization.
          # Leave empty for unsigned CI builds.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: zero-protocol-macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # ── Linux AppImage / deb ───────────────────────────────────────────────────
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build Linux bundle
        run: npm run tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: zero-protocol-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: zero-protocol-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
